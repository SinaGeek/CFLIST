name: Update CFLIST Subscriptions

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create folders
        run: mkdir -p normal singbox clash

      - name: Fetch subscriptions
        run: |
          curl -L --fail --show-error "https://p.hima-safety.ir/sub/normal/links?app=xray" > normal/index.txt
          curl -L --fail --show-error "https://p.hima-safety.ir/sub/normal/links?app=sing-box" > singbox/index.txt
          curl -L --fail --show-error "https://p.hima-safety.ir/sub/normal/links?app=clash" > clash/index.txt

      - name: Create HTML files safely
        run: |
          printf '%s\n' \
'<!DOCTYPE html>' \
'<html>' \
'<head>' \
'<meta charset="utf-8">' \
'<title>Subscription</title>' \
'<style>body{font-family:monospace;white-space:pre-wrap;padding:20px;}</style>' \
'</head>' \
'<body>' \
'<pre id="data">Loading...</pre>' \
'<script>' \
'fetch("index.txt")' \
'.then(r=>r.text())' \
'.then(t=>document.getElementById("data").textContent=t)' \
'.catch(e=>document.getElementById("data").textContent=e);' \
'</script>' \
'</body>' \
'</html>' > template.html

          cp template.html normal/index.html
          cp template.html singbox/index.html
          cp template.html clash/index.html

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add normal singbox clash

          git diff --cached --quiet && exit 0
          git commit -m "Update subscriptions"
          git push